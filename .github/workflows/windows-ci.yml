name: Windows CI

on:
  push:
    branches: [main, windows-rebuild]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build CodexWinBar.sln -c Release --nologo

      - name: Test
        run: dotnet test CodexWinBar.sln -c Release --nologo --no-build

      - name: Publish
        run: >
          dotnet publish src/CodexWinBar.App/CodexWinBar.App.csproj -c Release -r win-x64
          --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true
          -o artifacts/publish

      - uses: actions/upload-artifact@v4
        with:
          name: CodexWinBar-win-x64
          path: artifacts/publish/
