<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <title>CodexWinBar social card</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1200px; height: 630px; overflow: hidden; }
      body {
        position: relative;
        background: #0b0f14;
        color: #f8fafc;
        font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(125, 211, 252, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(125, 211, 252, 0.055) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: linear-gradient(120deg, #000 12%, transparent 80%);
      }
      .page {
        position: relative;
        display: grid;
        height: 100%;
        grid-template-columns: 0.95fr 1.05fr;
        gap: 46px;
        padding: 46px 52px;
      }
      .copy { display: flex; min-width: 0; flex-direction: column; }
      .brand { display: flex; align-items: center; gap: 13px; font-size: 22px; font-weight: 700; }
      .brand img { width: 42px; height: 42px; border-radius: 10px; }
      .eyebrow { margin: 66px 0 17px; color: #7dd3fc; font-size: 16px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
      h1 { margin: 0; max-width: 580px; font-size: 55px; line-height: 1.01; letter-spacing: -.055em; }
      h1 span { display: block; color: #4cc2ff; }
      .sub { margin: 22px 0 0; color: #b7c0cc; font-size: 19px; line-height: 1.45; }
      .foot { display: flex; margin-top: auto; align-items: center; gap: 16px; color: #94a3b8; font-size: 14px; }
      .foot b { color: #f8fafc; }
      .foot i { width: 3px; height: 3px; border-radius: 50%; background: #64748b; }
      .stage {
        position: relative;
        align-self: center;
        height: 520px;
        overflow: hidden;
        border: 1px solid #52677c;
        border-radius: 20px;
        background:
          radial-gradient(circle at 23% 36%, rgba(42, 132, 255, .5), transparent 28%),
          radial-gradient(circle at 72% 12%, rgba(41, 83, 190, .48), transparent 30%),
          linear-gradient(145deg, #112338, #0c1727 55%, #1a2b42);
        box-shadow: 0 28px 70px rgba(0,0,0,.45);
      }
      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
        background-size: 36px 36px;
      }
      .stage-label { position: absolute; top: 17px; left: 20px; color: rgba(255,255,255,.72); font-size: 13px; font-weight: 600; }
      .flyout { position: absolute; z-index: 2; top: 52px; right: 22px; width: 455px; height: auto; filter: drop-shadow(0 22px 28px rgba(0,0,0,.38)); }
      .taskbar {
        position: absolute;
        z-index: 1;
        right: 0;
        bottom: 0;
        left: 0;
        height: 66px;
        border-top: 1px solid rgba(255,255,255,.4);
        background: rgba(226,234,244,.9);
      }
      .widget { position: absolute; z-index: 3; bottom: 0; left: 17px; width: 405px; height: auto; }
      .demo { position: absolute; z-index: 4; right: 14px; bottom: 14px; padding: 5px 9px; border-radius: 999px; background: #122335; color: #dbeafe; font-size: 11px; font-weight: 700; }
      .url { position: absolute; right: 54px; bottom: 22px; color: #7f8ea0; font-family: "Cascadia Mono", Consolas, monospace; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="copy">
        <div class="brand"><img src="./icon-64.png" width="64" height="64" alt="" /><span>CodexWinBar</span></div>
        <p class="eyebrow">Open-source Windows 11 companion</p>
        <h1>Know your AI coding limits <span>before they break your flow.</span></h1>
        <p class="sub">A native taskbar overlay and flyout for seven supported integrations.</p>
        <div class="foot"><b>Windows 11 x64</b><i></i><span>Per-user</span><i></i><span>MIT open source</span></div>
      </div>
      <div class="stage">
        <span class="stage-label">Actual app UI</span>
        <img class="flyout" src="./screenshots/flyout-light.png" width="522" height="404" alt="" />
        <div class="taskbar"></div>
        <img class="widget" src="./screenshots/widget-embedded.png" width="425" height="72" alt="" />
        <span class="demo">Demo data</span>
      </div>
      <div class="url">itaycohen-prog.github.io/CodexWinBar</div>
    </div>
  </body>
</html>
